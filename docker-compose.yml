# Local-first demo stack for Scaling & Operating Gen AI in Production.
# Pinned to the recording baseline in the course Author Notes.
#
# A fixed project name means `docker compose` commands (including the Step 6
# `docker compose exec postgres ...`) resolve to the SAME stack regardless of
# which folder they are run from — so a student never hits "service postgres is
# not running" just because of their working directory.
name: genai-scaling

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: genai
      POSTGRES_USER: genai
      POSTGRES_PASSWORD: genai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genai -d genai"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    # Mount the live source over the image's baked copy and run uvicorn with
    # --reload. This is the student-proofing that matters most: after a
    # `git pull`, the running API reflects the new code immediately — no image
    # rebuild, no container restart, no stale endpoints returning 404. The
    # image still bakes requirements.txt, so a rebuild is only needed when
    # dependencies change.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./app:/srv/app
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: genai
      POSTGRES_USER: genai
      POSTGRES_PASSWORD: genai
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
