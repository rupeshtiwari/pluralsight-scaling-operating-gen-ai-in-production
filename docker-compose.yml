# Local-first demo stack for Scaling & Operating Gen AI in Production.
# Pinned to the recording baseline in the course Author Notes.
services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: genai
      POSTGRES_USER: genai
      POSTGRES_PASSWORD: genai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genai -d genai"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: genai
      POSTGRES_USER: genai
      POSTGRES_PASSWORD: genai
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
