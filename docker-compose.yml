# Local-first demo stack for Scaling & Operating Gen AI in Production.
# Pinned to the recording baseline in the course Author Notes.
#
# A fixed project name means `docker compose` commands (including the Step 6
# `docker compose exec postgres ...`) resolve to the SAME stack regardless of
# which folder they are run from — so a student never hits "service postgres is
# not running" just because of their working directory.
name: genai-scaling

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: genai
      POSTGRES_USER: genai
      POSTGRES_PASSWORD: genai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genai -d genai"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    # Mount the live source over the image's baked copy and run uvicorn with
    # --reload. This is the student-proofing that matters most: after a
    # `git pull`, the running API reflects the new code immediately — no image
    # rebuild, no container restart, no stale endpoints returning 404. The
    # image still bakes requirements.txt, so a rebuild is only needed when
    # dependencies change.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./app:/srv/app
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: genai
      POSTGRES_USER: genai
      POSTGRES_PASSWORD: genai
      # When the obs profile is up, ship spans to the collector (forwarded to
      # Jaeger). Harmless when the collector is absent — export is best-effort.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # k6 load generator (Module 2, Clip 2). Run on demand, never as a long-lived
  # service, so it is gated behind the "load" profile and `docker compose up`
  # never starts it. Students with host k6 (brew install k6) run `k6 run ...`
  # directly; this service is the no-host-install fallback:
  #   docker compose run --rm k6 run --quiet module2/k6/clip2_spike.js
  k6:
    image: grafana/k6:0.49.0
    profiles: ["load"]
    working_dir: /work
    volumes:
      - .:/work
    environment:
      API_BASE: http://api:8000
    depends_on:
      - api

  # --- Observability stack (Module 2, Clip 5) -------------------------------
  # Gated behind the "obs" profile so `docker compose up` never starts them.
  # Bring them up with: docker compose --profile obs up -d
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    profiles: ["obs"]
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    profiles: ["obs"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI — open one trace by its id

  prometheus:
    image: prom/prometheus:v3.0.1
    profiles: ["obs"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"     # Prometheus UI — query metrics and see firing SLO alerts
    depends_on:
      - api
