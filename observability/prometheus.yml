# Prometheus (Module 2, Clip 5). Scrapes the FastAPI service's /metrics endpoint
# and evaluates the SLO alert rules for latency, availability, and output quality.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: genai-service
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
